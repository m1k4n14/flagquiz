            <h1 class="text-3xl font-bold text-slate-800 mb-4">🌍 看國旗猜國家</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">

                💡 未使用提示答對：<span class="text-green-600 font-bold">5 分</span><br>
                💡 使用提示答對：<span class="text-amber-500 font-bold">3 分</span><br>
                ❌ 答錯或跳過：<span class="text-red-500 font-bold">0 分</span>
            </p>
            <button id="start-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transform hover:-translate-y-0.5 transition-all w-full md:w-auto">
                開始挑戰
            </button>
        </div>

        <!-- 遊戲主畫面 (預設隱藏) -->
        <div id="quiz-screen" class="hidden">
            <!-- 進度條與分數 -->
            <div class="flex justify-between items-center mb-6">
                <span id="progress-text" class="text-sm font-semibold text-slate-500">第 1 / 20 題</span>
                <span id="score-text" class="text-lg font-bold text-indigo-600">分數: 0</span>
            </div>
            <div class="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-300" style="width: 5%"></div>
            </div>

            <!-- 國旗顯示區 -->
            <div class="flex justify-center items-center bg-slate-100 rounded-xl p-4 mb-6 min-h-[200px] border border-slate-200 shadow-inner">
                <img id="flag-img" src="" alt="National Flag" class="max-h-40 object-contain shadow-md rounded border border-slate-300">
            </div>

            <!-- 提示按鈕與提示文字 -->
            <div class="mb-6 text-center">
                <button id="hint-btn" class="text-sm font-medium text-amber-600 hover:text-amber-700 bg-amber-50 hover:bg-amber-100 border border-amber-200 px-4 py-1.5 rounded-full transition-colors focus:outline-none">
                    💡 顯示提示 (本題最高得 3 分)
                </button>
                <p id="hint-text" class="hidden mt-2 text-sm text-slate-500 font-semibold bg-slate-50 py-2 rounded-lg border border-dashed border-slate-200">
                    提示：這個國家位於 <span id="continent-name" class="text-amber-600"></span>
                </p>
            </div>

            <!-- 輸入框與提交 -->
            <form id="answer-form" onsubmit="event.preventDefault(); submitAnswer();" class="space-y-4">
                <div>
                    <input type="text" id="answer-input" autocomplete="off" placeholder="請輸入中文或英文國家名稱..." 
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 shadow-sm text-center font-medium">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button type="button" id="skip-btn" onclick="skipQuestion()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-4 rounded-xl transition-colors">
                        跳過此題
                    </button>
                    <button type="submit" id="submit-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors">
                        提交答案
                    </button>
                </div>
            </form>

            <!-- 答案反饋區 -->
            <div id="feedback" class="hidden mt-6 p-4 rounded-xl text-center font-bold"></div>
        </div>

            <h2 class="text-3xl font-bold text-slate-800 mb-2">🎉 挑戰結束！</h2>
            <p class="text-slate-500 mb-6">您的最終表現</p>
            
            <div class="bg-indigo-50 rounded-2xl p-6 mb-8 inline-block min-w-[200px]">

            { code: "na", zh: ["納米比亞"], en: ["namibia"], continent: "非洲" },
            { code: "za", zh: ["南非"], en: ["south africa"], continent: "非洲" },
            { code: "ls", zh: ["賴索托", "萊索托"], en: ["lesotho"], continent: "非洲" },
            { code: "sz", zh: ["史瓦帝尼", "斯威士蘭"], en: ["eswatini", "swaziland"], continent: "非洲" },
            { code: "mg", zh: ["馬達加斯加"], en: ["madagascar"], continent: "非洲" },
            { code: "mu", zh: ["模里西斯", "毛里求斯"], en: ["mauritius"], continent: "非洲" },
            { code: "km", zh: ["葛摩", "科摩羅"], en: ["comoros"], continent: "非洲" },
            { code: "sc", zh: ["塞席爾", "塞舌爾"], en: ["seychelles"], continent: "非洲" },
            { code: "cv", zh: ["維德角", "佛得角"], en: ["cape verde", "cabo verde"], continent: "非洲" }
        ];

        // 遊戲變數
        const TOTAL_QUESTIONS = 20;
        let quizPool = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let hintUsed = false;
        let isAnswered = false;

        // DOM 元素定義
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const flagImg = document.getElementById('flag-img');
        const hintBtn = document.getElementById('hint-btn');
        const hintText = document.getElementById('hint-text');
        const continentName = document.getElementById('continent-name');
        const answerInput = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback');
        const progressText = document.getElementById('progress-text');
        const scoreText = document.getElementById('score-text');
        const progressBar = document.getElementById('progress-bar');
        const finalScore = document.getElementById('final-score');
        const submitBtn = document.getElementById('submit-btn');

        // 初始化監聽器
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        hintBtn.addEventListener('click', showHint);

        // 開始遊戲
        function startGame() {
            // 洗牌算法隨機挑選 20 題
            const shuffled = [...countryDataset].sort(() => 0.5 - Math.random());
            quizPool = shuffled.slice(0, Math.min(TOTAL_QUESTIONS, shuffled.length));
            
            currentQuestionIndex = 0;
            score = 0;
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            updateScoreDisplay();
            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            isAnswered = false;
            hintUsed = false;
            
            // 重設 UI
            hintText.classList.add('hidden');
            hintBtn.classList.remove('hidden');
            feedback.classList.add('hidden');
            answerInput.value = '';
            answerInput.disabled = false;
            submitBtn.textContent = "提交答案";
            submitBtn.className = "bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors";
            
            // 更新進度條
            progressText.textContent = `第 ${currentQuestionIndex + 1} / ${quizPool.length} 題`;
            const progressPercent = ((currentQuestionIndex + 1) / quizPool.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // 設定國旗與提示內容
            const currentCountry = quizPool[currentQuestionIndex];
            flagImg.src = `https://flagcdn.com/w320/${currentCountry.code}.png`;
            continentName.textContent = currentCountry.continent;
            
            answerInput.focus();
        }

        // 顯示提示
        function showHint() {
            hintUsed = true;
            hintText.classList.remove('hidden');
            hintBtn.classList.add('hidden');
            answerInput.focus();
        }

        // 提交答案
        function submitAnswer() {
            if (isAnswered) {
                // 如果已經回答過，點擊該按鈕就進入下一題
                nextQuestion();
                return;
            }

            const userAnswer = answerInput.value.trim().toLowerCase();
            if (!userAnswer) return; // 空答案不處理

            const currentCountry = quizPool[currentQuestionIndex];
            
            // 驗證答案是否匹配中文或英文別名
            const isCorrect = currentCountry.zh.some(name => name.toLowerCase() === userAnswer) || 
                              currentCountry.en.some(name => name.toLowerCase() === userAnswer);

            isAnswered = true;
            answerInput.disabled = true;

            if (isCorrect) {
                const pointsEarned = hintUsed ? 3 : 5;
                score += pointsEarned;
                updateScoreDisplay();
                
                feedback.innerHTML = `🎉 正確！增加 ${pointsEarned} 分<br><span class="text-sm font-normal text-green-600">正確答案: ${currentCountry.zh[0]} / ${currentCountry.en[0].toUpperCase()}</span>`;
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-green-50 text-green-700 border border-green-200";
            } else {
                feedback.innerHTML = `❌ 答錯了！<br><span class="text-sm font-normal text-red-600">正確答案是: ${currentCountry.zh[0]} (${currentCountry.en[0].toUpperCase()})</span>`;
                feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-50 text-red-700 border border-red-200";
            }

            feedback.classList.remove('hidden');
            submitBtn.textContent = "下一題";
            submitBtn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors";
        }

        // 跳過題目
        function skipQuestion() {
            if (isAnswered) return;
            
            const currentCountry = quizPool[currentQuestionIndex];
            isAnswered = true;
            answerInput.disabled = true;

            feedback.innerHTML = `🏳️ 已跳過。<br><span class="text-sm font-normal text-slate-500">正確答案是: ${currentCountry.zh[0]} (${currentCountry.en[0].toUpperCase()})</span>`;
            feedback.className = "mt-6 p-4 rounded-xl text-center font-bold bg-slate-100 text-slate-600 border border-slate-200";
            
            feedback.classList.remove('hidden');
            submitBtn.textContent = "下一題";
            submitBtn.className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors";
        }

        // 進入下一題或結算
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizPool.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        // 更新即時分數
        function updateScoreDisplay() {
            scoreText.textContent = `分數: ${score}`;
        }

        // 結束遊戲結算
        function endGame() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            finalScore.textContent = score;
        }
    </script>
